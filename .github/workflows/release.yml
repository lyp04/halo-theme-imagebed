name: Release Theme

# 打一个 v 开头的标签（如 v1.0.0）即自动打包成可安装的 imagebed.zip 并发布到 Releases
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package theme
        run: zip -r imagebed.zip . -x '.git*' '.github*' '*.DS_Store'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: imagebed.zip
          generate_release_notes: true
